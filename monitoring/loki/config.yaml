auth_enabled: false

server:
  http_listen_port: 3100

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

# Control which OTel resource attributes become stream labels.
# Replaces the default 17-attribute list. Everything not listed here
# goes to structured metadata (still queryable, not a label).
# See: https://grafana.com/docs/loki/latest/send-data/otel/
distributor:
  otlp_config:
    default_resource_attributes_as_index_labels:
      - service.name

limits_config:
  allow_structured_metadata: true

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

storage_config:
  tsdb_shipper:
    active_index_directory: /loki/tsdb-index
    cache_location: /loki/tsdb-cache
